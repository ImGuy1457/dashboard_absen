<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Login — Sistem Absensi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══════════════════════════════════════
        THEME TOKENS (Variabel Warna Dinamis)
       ══════════════════════════════════════ */
    :root,
    [data-theme="dark"] {
      --orange:      #ff6a00;
      --orange-deep: #c84e00;
      --orange-glow: rgba(255,106,0,.35);

      --bg-body:     #070c17;
      --bg-card:     rgba(10,17,32,.9);
      --bg-input:    rgba(255,255,255,.04);
      --bg-input-focus: rgba(255,106,0,.06);
      --bg-net:      rgba(255,255,255,.025);
      --bg-footer:   transparent;

      --border-dim:  rgba(255,106,0,.14);
      --border-mid:  rgba(255,106,0,.32);
      --border-input: rgba(255,255,255,.08);

      --text-body:   #ffffff;
      --text-muted:  rgba(255,255,255,.32);
      --text-dim:    rgba(255,255,255,.6);
      --text-label:  rgba(255,106,0,.75);
      --text-footer: rgba(255,106,0,.6);
      --text-net:    rgba(255,255,255,.32);

      --red:   #ff5252;
      --green: #4cffb4;

      --grid-color: rgba(255,106,0,.035);
      --orb1-color: rgba(255,100,0,.38);
      --orb2-color: rgba(255,50,0,.22);
      --orb3-color: rgba(255,160,0,.18);

      --card-shadow: 0 0 0 .5px rgba(255,106,0,.07), 0 32px 90px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.035);
      --input-glow:  0 0 0 3px rgba(255,106,0,.11), 0 0 22px rgba(255,106,0,.07);

      --toggle-bg:   rgba(255,255,255,.07);
      --toggle-border: rgba(255,255,255,.12);
      --toggle-icon-color: rgba(255,255,255,.65);
      --toggle-active-bg: rgba(255,106,0,.18);
      --toggle-active-border: rgba(255,106,0,.4);
      --toggle-active-icon: #ff6a00;
    }

    [data-theme="light"] {
      --orange:      #EA7A1F;
      --orange-deep: #C96A12;
      --orange-glow: rgba(234,122,31,.28);

      --bg-body:     #F1F5F9; 
      --bg-card:     #FFFFFF;
      --bg-input:    #FFFFFF; 
      --bg-input-focus: rgba(234,122,31,.05);
      --bg-net:      rgba(15,23,42,.05);
      --bg-footer:   #F1F5F9;

      --border-dim:  #E2E8F0;
      --border-mid:  #EA7A1F;
      --border-input: #94A3B8; 

      --text-body:   #0F172A; 
      --text-dim:    #334155;
      --text-muted:  #64748B;
      --text-label:  #C96A12;
      --text-footer: #C96A12;
      --text-net:    #475569;

      --red:   #E53E3E;
      --green: #0F9B6B;
      --grid-color: rgba(234,122,31,.04);
      --orb1-color: rgba(234,122,31,.12);
      --orb2-color: rgba(200,80,0,.08);
      --orb3-color: rgba(255,180,0,.07);
      --card-shadow: 0 4px 6px -1px rgba(0,0,0,.05), 0 20px 25px -5px rgba(0,0,0,.1);
      --input-glow:  0 0 0 3px rgba(234,122,31,.15);
      --toggle-bg:   rgba(15,23,42,.08);
      --toggle-border: #CBD5E1;
      --toggle-icon-color: #64748B;
      --toggle-active-bg: rgba(234,122,31,.15);
      --toggle-active-border: #C96A12;
      --toggle-active-icon: #C96A12;
    }

    /* ══════════════════════════════════════
        BASE & SWITCHER STYLES
       ══════════════════════════════════════ */
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-body);
      color: var(--text-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background .35s ease, color .35s ease;
    }

    .theme-toggle-wrap {
      position: fixed; top: 18px; right: 18px; z-index: 200;
    }
    .theme-toggle {
      display: flex; align-items: center; background: var(--toggle-bg);
      border: 1px solid var(--toggle-border); border-radius: 99px; padding: 4px;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      transition: background .3s, border-color .3s;
    }
    .theme-btn {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%; border: none;
      background: transparent; cursor: pointer; font-size: 16px;
      color: var(--toggle-icon-color); transition: all .25s cubic-bezier(.22,1,.36,1);
      position: relative;
    }
    .theme-btn.active {
      background: var(--toggle-active-bg); border: 1px solid var(--toggle-active-border);
      color: var(--toggle-active-icon); box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .theme-btn:not(.active):hover { background: rgba(128,128,128,.08); }
    .theme-btn::after {
      content: attr(data-tip); position: absolute; bottom: -32px; left: 50%;
      transform: translateX(-50%); background: rgba(0,0,0,.7); color: #fff;
      font-size: 10px; padding: 3px 8px; border-radius: 6px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .theme-btn:hover::after { opacity: 1; }

    /* ══════════════════════════════════════
        BACKGROUND & ANIMATIONS
       ══════════════════════════════════════ */
    .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 52px 52px;
      transition: background-image .35s;
    }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .5; animation: drift 14s ease-in-out infinite alternate; }
    .orb-1 { width:440px;height:440px;background:radial-gradient(circle,var(--orb1-color),transparent 70%);top:-150px;left:-110px;animation-duration:14s; }
    .orb-2 { width:300px;height:300px;background:radial-gradient(circle,var(--orb2-color),transparent 70%);bottom:-90px;right:-70px;animation-duration:18s;animation-delay:-6s; }
    .orb-3 { width:180px;height:180px;background:radial-gradient(circle,var(--orb3-color),transparent 70%);top:58%;left:28%;animation-duration:10s;animation-delay:-3s; }
    @keyframes drift { from{transform:translate(0,0)scale(1)} to{transform:translate(28px,18px)scale(1.07)} }

    .particles { position:absolute;inset:0; }
    .particle { position:absolute;width:2px;height:2px;background:var(--orange);border-radius:50%;opacity:0;animation:float-up 8s ease-in-out infinite; }
    @keyframes float-up { 0%{opacity:0;transform:translateY(0)scale(0)} 20%{opacity:.6} 80%{opacity:.3} 100%{opacity:0;transform:translateY(-120px)scale(1.5)} }

    /* ══════════════════════════════════════
        CARD COMPONENT
       ══════════════════════════════════════ */
    .card-wrap { position:relative;z-index:10;width:92%;max-width:420px;animation:slideUp .65s cubic-bezier(.22,1,.36,1) both; }
    @keyframes slideUp { from{opacity:0;transform:translateY(44px)scale(.96)} to{opacity:1;transform:translateY(0)scale(1)} }

    .card {
      background: var(--bg-card); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--border-dim); border-radius: 22px; overflow: hidden;
      box-shadow: var(--card-shadow); transition: background .35s, border-color .35s, box-shadow .35s;
    }
    .top-bar {
      height: 3px;
      background: linear-gradient(90deg,transparent,var(--orange),#ffaa00,var(--orange),transparent);
      background-size: 200% 100%; animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .card-body { padding: 36px 36px 38px; }
    .card-header { display:flex;align-items:center;gap:16px;margin-bottom:30px; }
    
    .logo-ring {
      width:56px;height:56px;border-radius:14px;
      border:1.5px solid var(--border-mid);
      display:flex;align-items:center;justify-content:center;
      background:rgba(255,106,0,.07);
      box-shadow:0 0 20px rgba(255,106,0,.14),inset 0 0 14px rgba(255,106,0,.04);
      flex-shrink:0;position:relative;overflow:hidden;font-size:24px;
      transition: border-color .35s, background .35s;
    }
    [data-theme="light"] .logo-ring {
      background: rgba(234,122,31,.08);
      box-shadow: 0 0 16px rgba(234,122,31,.1);
    }
    .logo-ring img { width:36px;height:36px;object-fit:cover;border-radius:8px; }
    .logo-ring::after { content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent); }
    
    .header-text h1 { font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text-body);letter-spacing:-.3px;line-height:1.1;transition:color .35s; }
    .header-text p  { font-size:12.5px;color:var(--text-muted);margin-top:3px;letter-spacing:.02em;transition:color .35s; }

    .divider { height:1px;background:linear-gradient(90deg,transparent,var(--border-dim),transparent);margin-bottom:26px; }

    .net-status {
      display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
      color:var(--text-net);margin-bottom:20px;padding:8px 12px;border-radius:8px;
      background:var(--bg-net);border:1px solid rgba(128,128,128,.09);transition:all .3s;
    }
    .net-dot { width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s; }
    .net-status.online  .net-dot { background:var(--green);box-shadow:0 0 8px rgba(76,255,180,.5); }
    .net-status.offline .net-dot { background:var(--red);box-shadow:0 0 8px rgba(255,82,82,.5); }
    .net-status.online  { color:rgba(76,255,180,.7);border-color:rgba(76,255,180,.12); }
    .net-status.offline { color:rgba(255,82,82,.7);border-color:rgba(255,82,82,.12); }
    [data-theme="light"] .net-status.online  { color:#0F9B6B;border-color:rgba(15,155,107,.2); }
    [data-theme="light"] .net-status.offline { color:#E53E3E;border-color:rgba(229,62,62,.2); }

    /* ══════════════════════════════════════
        FORM FIELDS
       ══════════════════════════════════════ */
    .field { margin-bottom:18px; }
    .field-label { font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text-label);margin-bottom:8px;display:block;transition:color .35s; }
    .field-wrap { position:relative; }
    .field-wrap input, .field-wrap select {
      width:100%;padding:13px 16px;padding-right:44px;border-radius:10px;
      background:var(--bg-input);border:1px solid var(--border-input);color:var(--text-body);
      font-family:'DM Sans',sans-serif;font-size:14.5px;outline:none;appearance:none;-webkit-appearance:none;
      transition:border-color .25s,box-shadow .25s,background .25s,color .25s;
    }
    .field-wrap select option { background:var(--bg-card);color:var(--text-body); }
    .field-wrap input::placeholder { color:var(--text-muted); }
    .field-wrap input:focus, .field-wrap select:focus {
      border-color:var(--orange);background:var(--bg-input-focus);
      box-shadow:var(--input-glow);
    }
    .field-wrap .icon { position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.38;display:flex;align-items:center; }
    .field-wrap .icon svg { stroke: var(--text-body); } 
    .field-wrap .icon.clickable { pointer-events:all;cursor:pointer;transition:opacity .2s; }
    .field-wrap .icon.clickable:hover { opacity:.8; }

    /* ══════════════════════════════════════
        BUTTONS & LOGS
       ══════════════════════════════════════ */
    .btn-login {
      width:100%;margin-top:24px;padding:14px;border-radius:10px;
      background:linear-gradient(135deg,var(--orange),var(--orange-deep));
      border:none;color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
      position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;
      box-shadow:0 4px 26px rgba(255,106,0,.38);
    }
    [data-theme="light"] .btn-login { box-shadow: 0 4px 20px rgba(201,106,18,.3); }
    .btn-login::before { content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);border-radius:inherit; }
    .btn-login:hover:not(:disabled) { transform:translateY(-2px);box-shadow:0 9px 34px rgba(255,106,0,.52); }
    .btn-login:active:not(:disabled) { transform:translateY(0);box-shadow:0 2px 12px rgba(255,106,0,.28); }
    .btn-login:disabled { opacity:.6;cursor:not-allowed; }
    
    .ripple { position:absolute;border-radius:50%;background:rgba(255,255,255,.2);transform:scale(0);animation:ripple .55s linear;pointer-events:none; }
    @keyframes ripple { to{transform:scale(4);opacity:0} }

    .spinner { width:17px;height:17px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:none; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .error-msg {
      margin-top:13px;min-height:20px;font-size:13px;color:var(--red);text-align:center;
      display:flex;align-items:center;justify-content:center;gap:6px;
      opacity:0;transform:translateY(-4px);transition:opacity .3s,transform .3s;
    }
    .error-msg.show { opacity:1;transform:translateY(0); }

    .card-footer {
      padding:15px 36px;border-top:1px solid var(--border-dim);
      display:flex;align-items:center;justify-content:space-between;
      font-size:11.5px;color:var(--text-muted);letter-spacing:.03em;
      transition: border-color .35s;
    }
    .card-footer span { color:var(--text-footer); transition:color .35s; }
   
    /* FIX ANTI-PUDAR MODE SIANG */
    [data-theme="light"] .field-wrap .icon { opacity: 0.8; }
    [data-theme="light"] .field-wrap input::placeholder { color: #94A3B8; }
    [data-theme="light"] .net-status { font-weight: 600; }
  </style>
</head>
<body>

<div class="theme-toggle-wrap">
  <div class="theme-toggle">
    <button class="theme-btn active" id="btnDark" data-tip="Mode Malam" onclick="setTheme('dark')" aria-label="Mode Malam">🌙</button>
    <button class="theme-btn"        id="btnLight" data-tip="Mode Siang" onclick="setTheme('light')" aria-label="Mode Siang">☀️</button>
  </div>
</div>

<div class="bg">
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="particles" id="particles"></div>
</div>

<div class="card-wrap">
  <div class="card">
    <div class="top-bar"></div>
    <div class="card-body">

      <div class="card-header">
        <div class="logo-ring">
          <img src="tp2.jpeg" alt="Logo" onerror="this.style.display='none';this.parentNode.innerHTML+='🏢'">
        </div>
        <div class="header-text">
          <h1>Sistem Absensi</h1>
          <p>Masuk untuk melanjutkan</p>
        </div>
      </div>

      <div class="divider"></div>

      <div class="net-status" id="netStatus">
        <div class="net-dot"></div>
        <span id="netLabel">Memeriksa koneksi...</span>
      </div>

      <div class="field">
        <label class="field-label" for="username">Username</label>
        <div class="field-wrap">
          <select id="username" required>
            <option value="" disabled selected hidden>Pilih username…</option>
          </select>
          <span class="icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </span>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="field-wrap">
          <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password">
          <span class="icon clickable" id="eyeBtn" onclick="togglePw()" title="Tampilkan / Sembunyikan">
            <svg id="eyeClose" xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" stroke-width="2" viewBox="0 0 24 24">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19C5 19 1 12 1 12a21.77 21.77 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a21.72 21.72 0 0 1-3.06 4.25"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" stroke-width="2" viewBox="0 0 24 24" style="display:none">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </span>
        </div>
      </div>

      <button class="btn-login" id="btnLogin" onclick="handleLogin(event)">
        <div class="spinner" id="loader"></div>
        <span id="btnText">Login</span>
      </button>

      <div class="error-msg" id="errMsg">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="errText"></span>
      </div>

    </div>
    <div class="card-footer">
      <span>Sistem Absensi v2.1</span>
    </div>
  </div>
</div>

<script>
'use strict';

/* ── LOGIKA TOGGLE THEME ── */
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('absensi_theme', t);
  document.getElementById('btnDark').classList.toggle('active', t === 'dark');
  document.getElementById('btnLight').classList.toggle('active', t === 'light');
}

/* Otomatis jalankan tema saat halaman pertama kali dimuat */
(function() {
  const saved = localStorage.getItem('absensi_theme');
  const preferred = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  setTheme(preferred);
})();

/* ── Redirect jika sudah login ── */
fetch('/api/integration/session', { credentials: 'same-origin' })
  .then(res => { if (res.ok) window.location.replace('/integrasi/index.html'); })
  .catch(() => {});

/* Load Users ── */
let _usersCache = null;

async function getUsers() {
  if (_usersCache) return _usersCache;
  const res = await fetch('/api/integration/users', { cache: 'no-cache', credentials: 'same-origin' });
  const data = await res.json();
  if (!res.ok || !data.ok) throw new Error(data.message || 'Gagal memuat data pengguna');
  _usersCache = data.users || [];
  return _usersCache;
}

async function loadUsers() {
  const sel = document.getElementById('username');
  try {
    const users = await getUsers();
    users.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.username;
      opt.textContent = `${u.username} - ${u.jabatan || '-'}`;
      sel.appendChild(opt);
    });
  } catch {
    showErr('Gagal memuat daftar user dari database');
  }
}
loadUsers();

/* ── Particles ── */
(function spawnParticles() {
  const wrap = document.getElementById('particles');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;bottom:${Math.random()*30}%;animation-delay:${Math.random()*8}s;animation-duration:${6+Math.random()*8}s;opacity:0`;
    wrap.appendChild(p);
  }
})();

/* ── Network Status ── */
function updateNet() {
  const el = document.getElementById('netStatus');
  const lb = document.getElementById('netLabel');
  if (navigator.onLine) {
    el.className = 'net-status online';
    lb.textContent = 'Online — Koneksi tersedia';
  } else {
    el.className = 'net-status offline';
    lb.textContent = 'Offline — Periksa koneksi internet';
  }
}
updateNet();
window.addEventListener('online', updateNet);
window.addEventListener('offline', updateNet);

/* ── Toggle Password ── */
function togglePw() {
  const pw  = document.getElementById('password');
  const on  = document.getElementById('eyeOpen');
  const off = document.getElementById('eyeClose');
  const show = pw.type === 'password';
  pw.type = show ? 'text' : 'password';
  on.style.display  = show ? 'block' : 'none';
  off.style.display = show ? 'none'  : 'block';
  pw.focus();
}

/* ── Error helpers ── */
function showErr(msg) {
  document.getElementById('errText').textContent = msg;
  document.getElementById('errMsg').classList.add('show');
}
function clearErr() {
  document.getElementById('errMsg').classList.remove('show');
}

/* ── Ripple ── */
function ripple(btn, ev) {
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${size}px;height:${size}px;left:${(ev?.clientX??rect.left+rect.width/2)-rect.left-size/2}px;top:${(ev?.clientY??rect.top+rect.height/2)-rect.top-size/2}px`;
  btn.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

/* ── Login ── */
async function handleLogin(ev) {
  clearErr();
  const btn = document.getElementById('btnLogin');
  const un  = document.getElementById('username').value.trim();
  const pw  = document.getElementById('password').value;

  ripple(btn, ev);

  if (!un) return showErr('Pilih username terlebih dahulu.');
  if (!pw) return showErr('Masukkan password terlebih dahulu.');
  if (!navigator.onLine) return showErr('Tidak ada koneksi internet.');

  btn.disabled = true;
  document.getElementById('loader').style.display = 'block';
  document.getElementById('btnText').textContent  = 'Memproses...';

  try {
    await new Promise(r => setTimeout(r, 400));
    const res = await fetch('/api/integration/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ username: un, password: pw })
    });
    const data = await res.json();

    if (res.ok && data.ok) {
      const found = data.user;
      document.getElementById('btnText').textContent = 'Berhasil!';
      localStorage.setItem('loginUser', found.username);
      localStorage.setItem('loginJabatan', found.jabatan || '');
      setTimeout(() => window.location.replace('/integrasi/index.html'), 500);
    } else {
      showErr(data.message || 'Username atau password salah.');
      reset();
    }
  } catch (e) {
    console.error('Login error:', e);
    showErr('Gagal login ke database. Periksa koneksi server.');
    reset();
  }

  function reset() {
    btn.disabled = false;
    document.getElementById('loader').style.display = 'none';
    document.getElementById('btnText').textContent  = 'Login';
  }
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin(null);
});
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
</script>
</body>
</html>
